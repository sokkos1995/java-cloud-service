version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: cloudservice-db
    environment:
      POSTGRES_DB: cloudservice
      POSTGRES_USER: cloud
      POSTGRES_PASSWORD: cloud
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloud -d cloudservice"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: cloudservice-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cloudservice
      DB_USER: cloud
      DB_PASSWORD: cloud
      STORAGE_ROOT: /storage
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - storage_data:/storage

volumes:
  db_data:
  storage_data:
