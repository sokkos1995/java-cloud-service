server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cloudservice}
    username: ${DB_USER:cloud}
    password: ${DB_PASSWORD:cloud}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

storage:
  root-dir: ${STORAGE_ROOT:./storage}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
